<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}نظام الحضور{% endblock %}</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background-image: url('/static/background.jpg'); /* رابط الخلفية */
        background-size: cover; /* تغطية الشاشة بالكامل */
        background-repeat: no-repeat; /* منع تكرار الخلفية */
        background-position: center; /* توسيط الخلفية */
        background-attachment: fixed; /* تثبيت الخلفية أثناء التمرير */
        margin: 0;
        padding: 0;
        height: 100vh; /* جعل الصفحة تأخذ كامل ارتفاع الشاشة */
    }

    .navbar {
        background-color: rgba(43, 123, 255, 0.9); /* شريط شفاف قليلاً */
        padding: 15px 30px;
        display: flex;
        justify-content: space-between; /* توزيع العناصر على الجانبين */
        align-items: center; /* محاذاة العناصر عموديًا */
    }

    .logo {
        height: 60px; /* تكبير الشعار */
        width: auto; /* الحفاظ على نسبة العرض إلى الارتفاع */
    }

    .nav-links {
        display: flex;
        gap: 20px;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        font-size: 16px;
        font-weight: bold;
    }

    .nav-links a:hover {
        text-decoration: underline;
    }

    .content {
        padding: 40px;
        max-width: 900px;
        margin: auto;
        background-color: rgba(255, 255, 255, 0.9); /* خلفية بيضاء شفافة */
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    h1, h2 {
        text-align: center;
        color: #333;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: #fff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 12px;
        text-align: right;
        border-bottom: 1px solid #ddd;
        font-size: 16px;
    }

    th {
        background-color: #f0f0f0;
    }

    tr:hover {
        background-color: #f9f9f9;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #2b7bff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 15px;
    }

    button:hover {
        background-color: #005ce6;
    }

    input[type="text"] {
        padding: 10px;
        font-size: 16px;
        width: 100%;
        margin-bottom: 15px;
    }
    .home-button {
        text-decoration: none;
        background-color: #2b7bff;
        color: white;
        padding: 15px 30px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        transition: background-color 0.2s, transform 0.2s;
    }

    .home-button:hover {
        background-color: #005ce6;
        transform: scale(1.03);
    }
    .flash-message {
        background-color: #d4edda;
        color: #155724;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        text-align: center;
        font-weight: bold;
        animation: fadeOut 0.5s ease-in 3s forwards;
    }

    @keyframes fadeOut {
        to {
            opacity: 0;
            visibility: hidden;
            height: 0;
            padding: 0;
            margin: 0;
        }
    }
    .print-btn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }

    @media print {
      .print-btn, .navbar, .search-form, .back-btn {
        display: none !important;
      }
    }
    .print-btn {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 18px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
    }
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 400px;
    }

    .radio-group {
      display: flex;
      flex-direction: row;
      gap: 10px;
      align-items: center;
    }

    .add-btn {
      background-color: #007bff;
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .table-container {
      margin-top: 30px;
      overflow-x: auto;
    }

    .persons-table {
      width: 100%;
      border-collapse: collapse;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      direction: rtl;
    }

    .persons-table th, .persons-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    .persons-table th {
      background-color: #f2f2f2;
      font-weight: bold;
    }

    .persons-table tr:hover {
      background-color: #f9f9f9;
    }

    .inline-form {
      display: inline-block;
      margin: 0 2px;
    }

    .edit-btn, .delete-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .edit-btn {
      background-color: #007bff;
      color: white;
    }

    .delete-btn {
      background-color: #dc3545;
      color: white;
    }
    .logo {
      height: 50px;
      margin-left: 10px;
    }

    .nav-links {
      display: flex;
      gap: 15px;
      margin-right: 10px;
    }
    </style>
</head>
<body>

    <div class="navbar">
    <div class="nav-links">
        <a href="/">🏠 الرئيسية</a>
        <a href="/add">➕ إضافة شخص</a>
        <a href="/attendance">✅ تسجيل الحضور</a>
        <a href="/report">📊 التقارير</a>
    </div>
    <img src="/static/logo.png" alt="Logo" class="logo">
</div>

    <div class="content">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-message">
            {% for msg in messages %}
            {{ msg }}
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>

</body>
</html>
